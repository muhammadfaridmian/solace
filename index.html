<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Solace. A safe space to let it out. No judgment. No fixing. Just space to feel." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Solace</title>
  </head>
  <body>
    <script>
      // Set theme before React mounts to prevent flash
      try {
        const s = JSON.parse(localStorage.getItem('solace-storage') || '{}');
        const t = s?.state?.theme || 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch { document.documentElement.setAttribute('data-theme', 'light'); }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
